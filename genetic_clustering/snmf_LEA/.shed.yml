name: lea_snmf
owner: ecology
description: Individual ancestry estimation and population structure inference using the sNMF algorithm (R package LEA).
homepage_url: https://github.com/GINAMO-EBVs/ginamo-workflows/LEA_snmf
  This tool estimates individual ancestry proportions using the sNMF algorithm.
  The tool supports VCF (SNPs) and Tabular (SSRs) inputs, automatically converting them to .geno format.
  It evaluates a range of K values with multiple repetitions and selects the best fit using cross-entropy.
  Unique features include an optional validation step using pairwise Fst permutation tests on 'pure' individuals 
  (ancestry >= 80%), decrementing K until statistical significance (p < 0.05) is achieved.
  Outputs include cross-entropy plots, STRUCTURE-style barplots, and detailed membership tables.
remote_repository_url: https://github.com/galaxyecology/tools-ecology/tree/master/tools/LEA_snmf
type: unrestricted
categories:
- Ecology
auto_tool_repositories:
