name: dapc_kmeans
owner: ecology
description: Discriminant Analysis of Principal Components (dAPC) for genomic data.
homepage_url: https://github.com/GINAMO-EBVs/ginamo-workflows/dAPC
  This tool performs a Discriminant Analysis of Principal Components (DAPC) to identify genetic clusters using SNPs (VCF) or SSRs (tabular).
  It implements K-means clustering with BIC for automatic K selection and follows the Thia (2022) guidelines for PCA axis retention to avoid over-fitting.
  Outputs include BIC curves, PCA and DAPC scatter plots, and STRUCTURE-style posterior membership barplots.
remote_repository_url: https://github.com/galaxyecology/tools-ecology/tree/master/tools/dAPC
type: unrestricted
categories:
- Ecology
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "{{ tool_name }}"
